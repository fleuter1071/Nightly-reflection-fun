<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Nightly Review</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: rgba(255, 252, 246, 0.72);
      --text: #2f342f;
      --muted: #6f766f;
      --line: rgba(47, 52, 47, 0.12);
      --accent: #7d8b7a;
      --accent-soft: rgba(125, 139, 122, 0.12);
      --button-bg: rgba(255, 252, 246, 0.88);
      --shadow: 0 10px 30px rgba(60, 64, 52, 0.08);
      --radius: 22px;
      --focus: rgba(125, 139, 122, 0.28);
      --max-width: 680px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #181b18;
        --panel: rgba(31, 35, 31, 0.8);
        --text: #ece7dc;
        --muted: #a4aa9f;
        --line: rgba(236, 231, 220, 0.12);
        --accent: #9bad98;
        --accent-soft: rgba(155, 173, 152, 0.16);
        --button-bg: rgba(31, 35, 31, 0.92);
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
        --focus: rgba(155, 173, 152, 0.28);
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding:
        calc(env(safe-area-inset-top, 0px) + 16px)
        16px
        calc(env(safe-area-inset-bottom, 0px) + 16px);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.22), transparent 35%),
        linear-gradient(to bottom, var(--bg), var(--bg));
    }

    .app {
      width: 100%;
      max-width: var(--max-width);
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 32px);
      gap: 14px;
    }

    .shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      padding: 18px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
    }

    .progress {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      user-select: none;
    }

    .view {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px 20px 20px;
    }

    .question-wrap {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .question {
      margin: 0;
      font-size: clamp(1.65rem, 4.6vw, 2.35rem);
      line-height: 1.24;
      font-weight: 500;
      text-wrap: balance;
    }

    .answer-label {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }

    .textarea {
      width: 100%;
      min-height: 210px;
      max-height: 45vh;
      resize: none;
      padding: 18px 18px 22px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.18);
      color: var(--text);
      font: 400 1.02rem/1.6 Arial, Helvetica, sans-serif;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      overflow-y: auto;
    }

    .textarea::placeholder {
      color: var(--muted);
    }

    .textarea:focus {
      border-color: transparent;
      box-shadow:
        0 0 0 4px var(--focus),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .footer {
      border-top: 1px solid var(--line);
      padding:
        12px
        16px
        calc(env(safe-area-inset-bottom, 0px) + 12px);
      background: rgba(255, 252, 246, 0.16);
    }

    @media (prefers-color-scheme: dark) {
      .footer {
        background: rgba(255, 255, 255, 0.02);
      }
    }

    .nav {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--button-bg);
      color: var(--text);
      border-radius: 18px;
      padding: 14px 16px;
      font: 600 0.98rem/1 Arial, Helvetica, sans-serif;
      min-height: 52px;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 1px 0 rgba(255,255,255,0.1);
    }

    .button:active {
      transform: translateY(1px);
    }

    .button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px var(--focus);
    }

    .button.secondary {
      background: transparent;
    }

    .button.primary {
      background: var(--accent-soft);
      border-color: transparent;
    }

    .button:disabled {
      opacity: 0.45;
      cursor: default;
      transform: none;
    }

    .summary {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 22px;
      padding-bottom: 10px;
    }

    .summary-title {
      margin: 0;
      font-size: clamp(1.7rem, 4.8vw, 2.4rem);
      line-height: 1.2;
      font-weight: 500;
    }

    .summary-date {
      margin: -8px 0 4px;
      color: var(--muted);
      font: 400 0.98rem/1.5 Arial, Helvetica, sans-serif;
    }

    .summary-item {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 0 18px;
      border-bottom: 1px solid var(--line);
    }

    .summary-item:last-of-type {
      border-bottom: none;
      padding-bottom: 0;
    }

    .summary-question {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.5;
      font-weight: 600;
      font-family: Arial, Helvetica, sans-serif;
    }

    .summary-answer {
      margin: 0;
      color: var(--text);
      white-space: pre-wrap;
      word-wrap: break-word;
      font: 400 1rem/1.7 Arial, Helvetica, sans-serif;
      min-height: 1.7em;
    }

    .summary-answer.empty {
      color: var(--muted);
      font-style: italic;
    }

    .summary-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .summary-actions .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .status {
      min-height: 22px;
      text-align: center;
      color: var(--muted);
      font: 400 0.92rem/1.4 Arial, Helvetica, sans-serif;
      padding: 0 6px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 520px) {
      .app {
        min-height: calc(100vh - 16px);
      }

      .shell {
        border-radius: 24px;
      }

      .view {
        padding: 6px 16px 16px;
      }

      .topbar {
        padding: 16px 16px 8px;
      }

      .textarea {
        min-height: 230px;
        font-size: 16px;
      }

      .question-wrap,
      .summary,
      .nav {
        max-width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .button {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell" aria-label="Nightly Review">
      <div class="topbar">
        <div id="progress" class="progress" aria-live="polite"></div>
      </div>

      <div class="view" id="questionView">
        <div class="question-wrap">
          <h1 id="questionText" class="question"></h1>

          <label id="answerLabel" class="answer-label" for="answerInput"></label>
          <textarea
            id="answerInput"
            class="textarea"
            placeholder="Write here…"
            autocomplete="off"
            autocapitalize="sentences"
            spellcheck="true"
          ></textarea>
        </div>
      </div>

      <div class="view hidden" id="summaryView">
        <div class="summary">
          <h1 class="summary-title">Nightly Review</h1>
          <p id="summaryDate" class="summary-date"></p>
          <div id="summaryItems"></div>

          <div class="summary-actions">
            <button id="shareButton" class="button primary" type="button">
              Share by text
            </button>

            <div class="button-row">
              <button id="copyButton" class="button" type="button">Copy all</button>
              <button id="editButton" class="button secondary" type="button">Edit answers</button>
            </div>
          </div>
        </div>
      </div>

      <footer class="footer" id="footerNav">
        <div class="nav">
          <button id="backButton" class="button secondary" type="button">Back</button>
          <button id="nextButton" class="button primary" type="button">Next</button>
        </div>
      </footer>
    </section>

    <div id="status" class="status" aria-live="polite"></div>
  </main>

  <script>
    (function () {
      const STORAGE_KEY = "nightly-review-mobile-v2";

      const questions = [
        { id: "q1", text: "Was I resentful?" },
        { id: "q2", text: "Was I selfish?" },
        { id: "q3", text: "Was I dishonest?" },
        { id: "q4", text: "Was I afraid?" },
        { id: "q5", text: "Do I owe an apology?" },
        {
          id: "q6",
          text: "Have I kept something to myself which should be discussed with another person at once?"
        },
        { id: "q7", text: "Was I kind and loving toward all?" },
        { id: "q8", text: "What could I have done better?" }
      ];

      const progressEl = document.getElementById("progress");
      const questionTextEl = document.getElementById("questionText");
      const answerLabelEl = document.getElementById("answerLabel");
      const answerInputEl = document.getElementById("answerInput");
      const statusEl = document.getElementById("status");

      const questionViewEl = document.getElementById("questionView");
      const summaryViewEl = document.getElementById("summaryView");
      const summaryItemsEl = document.getElementById("summaryItems");
      const summaryDateEl = document.getElementById("summaryDate");
      const footerNavEl = document.getElementById("footerNav");

      const backButtonEl = document.getElementById("backButton");
      const nextButtonEl = document.getElementById("nextButton");
      const shareButtonEl = document.getElementById("shareButton");
      const copyButtonEl = document.getElementById("copyButton");
      const editButtonEl = document.getElementById("editButton");

      let state = loadState();

      function createInitialState() {
        return {
          date: getTodayLocalISO(),
          currentQuestion: 0,
          answers: {
            q1: "",
            q2: "",
            q3: "",
            q4: "",
            q5: "",
            q6: "",
            q7: "",
            q8: ""
          },
          lastSavedAt: new Date().toISOString(),
          mode: "question"
        };
      }

      function getTodayLocalISO() {
        const now = new Date();
        const offsetMs = now.getTimezoneOffset() * 60 * 1000;
        return new Date(now.getTime() - offsetMs).toISOString().slice(0, 10);
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return createInitialState();

          const parsed = JSON.parse(raw);
          const base = createInitialState();

          const merged = {
            ...base,
            ...parsed,
            answers: {
              ...base.answers,
              ...(parsed.answers || {})
            }
          };

          if (!questions[merged.currentQuestion] && merged.mode !== "summary") {
            merged.currentQuestion = 0;
          }

          if (!merged.date) {
            merged.date = getTodayLocalISO();
          }

          return merged;
        } catch (error) {
          return createInitialState();
        }
      }

      function saveState() {
        state.lastSavedAt = new Date().toISOString();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function setStatus(message) {
        statusEl.textContent = message;
        if (setStatus._timer) {
          clearTimeout(setStatus._timer);
        }
        if (message) {
          setStatus._timer = setTimeout(() => {
            statusEl.textContent = "";
          }, 1800);
        }
      }

      function autoResizeTextarea() {
        answerInputEl.style.height = "auto";
        answerInputEl.style.height =
          Math.min(answerInputEl.scrollHeight, window.innerHeight * 0.45) + "px";
      }

      function formattedDateString(dateISO) {
        const [year, month, day] = dateISO.split("-").map(Number);
        const date = new Date(year, month - 1, day);
        return date.toLocaleDateString(undefined, {
          weekday: "long",
          month: "long",
          day: "numeric",
          year: "numeric"
        });
      }

      function buildShareText() {
        const lines = [];
        lines.push(`Nightly Review for ${state.date}`);
        lines.push("");

        questions.forEach((question, index) => {
          const answer = (state.answers[question.id] || "").trim();
          lines.push(`${index + 1}. ${question.text}`);
          lines.push(answer || "[No response]");
          lines.push("");
        });

        return lines.join("\n").trim();
      }

      function renderQuestionView() {
        const question = questions[state.currentQuestion];
        questionTextEl.textContent = question.text;
        answerLabelEl.textContent = question.text;
        answerInputEl.value = state.answers[question.id] || "";
        progressEl.textContent = `${state.currentQuestion + 1} of ${questions.length}`;
        backButtonEl.disabled = state.currentQuestion === 0;
        nextButtonEl.textContent =
          state.currentQuestion === questions.length - 1 ? "Finish" : "Next";

        questionViewEl.classList.remove("hidden");
        summaryViewEl.classList.add("hidden");
        footerNavEl.classList.remove("hidden");

        requestAnimationFrame(() => {
          autoResizeTextarea();
          answerInputEl.focus({ preventScroll: true });
          answerInputEl.setSelectionRange(
            answerInputEl.value.length,
            answerInputEl.value.length
          );
        });
      }

      function renderSummaryView() {
        progressEl.textContent = "Complete";
        summaryDateEl.textContent = formattedDateString(state.date);
        summaryItemsEl.innerHTML = "";

        questions.forEach((question, index) => {
          const wrapper = document.createElement("section");
          wrapper.className = "summary-item";

          const q = document.createElement("h2");
          q.className = "summary-question";
          q.textContent = `${index + 1}. ${question.text}`;

          const a = document.createElement("p");
          const value = (state.answers[question.id] || "").trim();
          a.className = "summary-answer" + (value ? "" : " empty");
          a.textContent = value || "[No response]";

          wrapper.appendChild(q);
          wrapper.appendChild(a);
          summaryItemsEl.appendChild(wrapper);
        });

        questionViewEl.classList.add("hidden");
        summaryViewEl.classList.remove("hidden");
        footerNavEl.classList.add("hidden");
      }

      function render() {
        if (state.mode === "summary") {
          renderSummaryView();
        } else {
          renderQuestionView();
        }
      }

      function persistCurrentAnswer() {
        const current = questions[state.currentQuestion];
        state.answers[current.id] = answerInputEl.value;
        saveState();
      }

      answerInputEl.addEventListener("input", () => {
        const current = questions[state.currentQuestion];
        state.answers[current.id] = answerInputEl.value;
        saveState();
        autoResizeTextarea();
      });

      answerInputEl.addEventListener("blur", () => {
        persistCurrentAnswer();
      });

      answerInputEl.addEventListener("keydown", (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
          event.preventDefault();
          nextButtonEl.click();
        }
      });

      backButtonEl.addEventListener("click", () => {
        persistCurrentAnswer();
        if (state.currentQuestion > 0) {
          state.currentQuestion -= 1;
          state.mode = "question";
          saveState();
          render();
        }
      });

      nextButtonEl.addEventListener("click", () => {
        persistCurrentAnswer();
        if (state.currentQuestion < questions.length - 1) {
          state.currentQuestion += 1;
          state.mode = "question";
        } else {
          state.mode = "summary";
        }
        saveState();
        render();
      });

      editButtonEl.addEventListener("click", () => {
        state.mode = "question";
        state.currentQuestion = 0;
        saveState();
        render();
      });

      copyButtonEl.addEventListener("click", async () => {
        const text = buildShareText();
        try {
          await navigator.clipboard.writeText(text);
          setStatus("Copied.");
        } catch (error) {
          fallbackCopy(text);
        }
      });

      shareButtonEl.addEventListener("click", async () => {
        const text = buildShareText();

        if (navigator.share) {
          try {
            await navigator.share({
              title: "Nightly Review",
              text
            });
            return;
          } catch (error) {
            if (error && error.name === "AbortError") return;
          }
        }

        if (isLikelyMobile()) {
          const smsBody = encodeURIComponent(text);
          window.location.href = `sms:?&body=${smsBody}`;
          return;
        }

        try {
          await navigator.clipboard.writeText(text);
          setStatus("Copied for sharing.");
        } catch (error) {
          fallbackCopy(text);
        }
      });

      function fallbackCopy(text) {
        const temp = document.createElement("textarea");
        temp.value = text;
        temp.setAttribute("readonly", "");
        temp.style.position = "absolute";
        temp.style.left = "-9999px";
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
        setStatus("Copied.");
      }

      function isLikelyMobile()
