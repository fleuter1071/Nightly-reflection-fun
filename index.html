<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Nightly Review</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: rgba(255, 252, 246, 0.76);
      --text: #2f342f;
      --muted: #6f766f;
      --line: rgba(47, 52, 47, 0.12);
      --accent: #7d8b7a;
      --accent-soft: rgba(125, 139, 122, 0.14);
      --button-bg: rgba(255, 252, 246, 0.9);
      --shadow: 0 10px 30px rgba(60, 64, 52, 0.08);
      --radius: 22px;
      --focus: rgba(125, 139, 122, 0.28);
      --max-width: 680px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #181b18;
        --panel: rgba(31, 35, 31, 0.84);
        --text: #ece7dc;
        --muted: #a4aa9f;
        --line: rgba(236, 231, 220, 0.12);
        --accent: #9bad98;
        --accent-soft: rgba(155, 173, 152, 0.16);
        --button-bg: rgba(31, 35, 31, 0.94);
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.24);
        --focus: rgba(155, 173, 152, 0.28);
      }
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding:
        calc(env(safe-area-inset-top, 0px) + 16px)
        16px
        calc(env(safe-area-inset-bottom, 0px) + 16px);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.18), transparent 35%),
        linear-gradient(to bottom, var(--bg), var(--bg));
    }

    .app {
      width: 100%;
      max-width: var(--max-width);
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 32px);
      gap: 14px;
    }

    .shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      padding: 18px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
    }

    .progress {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      user-select: none;
    }

    .view {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px 20px 20px;
    }

    .question-wrap,
    .summary {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    .question-wrap {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .question {
      margin: 0;
      font-size: clamp(1.7rem, 4.8vw, 2.35rem);
      line-height: 1.24;
      font-weight: 500;
      color: var(--text);
    }

    .answer-label {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }

    .textarea {
      width: 100%;
      min-height: 210px;
      resize: none;
      padding: 18px 18px 22px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.16);
      color: var(--text);
      font: 400 1.02rem/1.6 Arial, Helvetica, sans-serif;
      outline: none;
      overflow-y: auto;
    }

    .textarea::placeholder {
      color: var(--muted);
    }

    .textarea:focus {
      border-color: transparent;
      box-shadow: 0 0 0 4px var(--focus);
    }

    .footer {
      border-top: 1px solid var(--line);
      padding:
        12px
        16px
        calc(env(safe-area-inset-bottom, 0px) + 12px);
      background: rgba(255, 252, 246, 0.14);
    }

    @media (prefers-color-scheme: dark) {
      .footer {
        background: rgba(255, 255, 255, 0.02);
      }
    }

    .nav {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--button-bg);
      color: var(--text);
      border-radius: 18px;
      padding: 14px 16px;
      font: 600 0.98rem/1 Arial, Helvetica, sans-serif;
      min-height: 52px;
      cursor: pointer;
    }

    .button.secondary {
      background: transparent;
    }

    .button.primary {
      background: var(--accent-soft);
      border-color: transparent;
    }

    .button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px var(--focus);
    }

    .summary {
      display: flex;
      flex-direction: column;
      gap: 22px;
      padding-bottom: 10px;
    }

    .summary-title {
      margin: 0;
      font-size: clamp(1.7rem, 4.8vw, 2.4rem);
      line-height: 1.2;
      font-weight: 500;
    }

    .summary-date {
      margin: -8px 0 4px;
      color: var(--muted);
      font: 400 0.98rem/1.5 Arial, Helvetica, sans-serif;
    }

    .summary-item {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 0 18px;
      border-bottom: 1px solid var(--line);
    }

    .summary-item:last-of-type {
      border-bottom: none;
      padding-bottom: 0;
    }

    .summary-question {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.5;
      font-weight: 600;
      font-family: Arial, Helvetica, sans-serif;
    }

    .summary-answer {
      margin: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
      font: 400 1rem/1.7 Arial, Helvetica, sans-serif;
      min-height: 1.7em;
    }

    .summary-answer.empty {
      color: var(--muted);
      font-style: italic;
    }

    .summary-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .status {
      min-height: 22px;
      text-align: center;
      color: var(--muted);
      font: 400 0.92rem/1.4 Arial, Helvetica, sans-serif;
      padding: 0 6px;
    }

    .error-box {
      max-width: 560px;
      margin: 0 auto;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(180, 70, 70, 0.35);
      background: rgba(180, 70, 70, 0.08);
      font: 400 0.98rem/1.6 Arial, Helvetica, sans-serif;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 520px) {
      .app {
        min-height: calc(100vh - 16px);
      }

      .shell {
        border-radius: 24px;
      }

      .view {
        padding: 6px 16px 16px;
      }

      .topbar {
        padding: 16px 16px 8px;
      }

      .textarea {
        min-height: 230px;
        font-size: 16px;
      }

      .question-wrap,
      .summary,
      .nav {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell" aria-label="Nightly Review">
      <div class="topbar">
        <div id="progress" class="progress" aria-live="polite"></div>
      </div>

      <div class="view" id="questionView">
        <div class="question-wrap">
          <h1 id="questionText" class="question"></h1>
          <div id="errorBox" class="error-box hidden"></div>

          <label id="answerLabel" class="answer-label" for="answerInput"></label>
          <textarea
            id="answerInput"
            class="textarea"
            placeholder="Write here…"
            autocomplete="off"
            autocapitalize="sentences"
            spellcheck="true"
          ></textarea>
        </div>
      </div>

      <div class="view hidden" id="summaryView">
        <div class="summary">
          <h1 class="summary-title">Nightly Review</h1>
          <p id="summaryDate" class="summary-date"></p>
          <div id="summaryItems"></div>

          <div class="summary-actions">
            <button id="shareButton" class="button primary" type="button">Share by text</button>
            <div class="button-row">
              <button id="copyButton" class="button" type="button">Copy all</button>
              <button id="editButton" class="button secondary" type="button">Edit answers</button>
            </div>
          </div>
        </div>
      </div>

      <footer class="footer" id="footerNav">
        <div class="nav">
          <button id="backButton" class="button secondary" type="button">Back</button>
          <button id="nextButton" class="button primary" type="button">Next</button>
        </div>
      </footer>
    </section>

    <div id="status" class="status" aria-live="polite"></div>
  </main>

  <script>
    (function () {
      "use strict";

      var STORAGE_KEY = "nightly-review-mobile-v3";

      var questions = [
        { id: "q1", text: "Was I resentful?" },
        { id: "q2", text: "Was I selfish?" },
        { id: "q3", text: "Was I dishonest?" },
        { id: "q4", text: "Was I afraid?" },
        { id: "q5", text: "Do I owe an apology?" },
        { id: "q6", text: "Have I kept something to myself which should be discussed with another person at once?" },
        { id: "q7", text: "Was I kind and loving toward all?" },
        { id: "q8", text: "What could I have done better?" }
      ];

      var progressEl = document.getElementById("progress");
      var questionTextEl = document.getElementById("questionText");
      var answerLabelEl = document.getElementById("answerLabel");
      var answerInputEl = document.getElementById("answerInput");
      var statusEl = document.getElementById("status");
      var errorBoxEl = document.getElementById("errorBox");

      var questionViewEl = document.getElementById("questionView");
      var summaryViewEl = document.getElementById("summaryView");
      var summaryItemsEl = document.getElementById("summaryItems");
      var summaryDateEl = document.getElementById("summaryDate");
      var footerNavEl = document.getElementById("footerNav");

      var backButtonEl = document.getElementById("backButton");
      var nextButtonEl = document.getElementById("nextButton");
      var shareButtonEl = document.getElementById("shareButton");
      var copyButtonEl = document.getElementById("copyButton");
      var editButtonEl = document.getElementById("editButton");

      var state = loadState();

      function getTodayLocalISO() {
        var now = new Date();
        var offsetMs = now.getTimezoneOffset() * 60000;
        return new Date(now.getTime() - offsetMs).toISOString().slice(0, 10);
      }

      function createInitialState() {
        return {
          date: getTodayLocalISO(),
          currentQuestion: 0,
          mode: "question",
          lastSavedAt: new Date().toISOString(),
          answers: {
            q1: "",
            q2: "",
            q3: "",
            q4: "",
            q5: "",
            q6: "",
            q7: "",
            q8: ""
          }
        };
      }

      function loadState() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return createInitialState();

          var parsed = JSON.parse(raw);
          var base = createInitialState();

          return {
            date: parsed.date || base.date,
            currentQuestion: typeof parsed.currentQuestion === "number" ? parsed.currentQuestion : 0,
            mode: parsed.mode === "summary" ? "summary" : "question",
            lastSavedAt: parsed.lastSavedAt || base.lastSavedAt,
            answers: {
              q1: parsed.answers && typeof parsed.answers.q1 === "string" ? parsed.answers.q1 : "",
              q2: parsed.answers && typeof parsed.answers.q2 === "string" ? parsed.answers.q2 : "",
              q3: parsed.answers && typeof parsed.answers.q3 === "string" ? parsed.answers.q3 : "",
              q4: parsed.answers && typeof parsed.answers.q4 === "string" ? parsed.answers.q4 : "",
              q5: parsed.answers && typeof parsed.answers.q5 === "string" ? parsed.answers.q5 : "",
              q6: parsed.answers && typeof parsed.answers.q6 === "string" ? parsed.answers.q6 : "",
              q7: parsed.answers && typeof parsed.answers.q7 === "string" ? parsed.answers.q7 : "",
              q8: parsed.answers && typeof parsed.answers.q8 === "string" ? parsed.answers.q8 : ""
            }
          };
        } catch (e) {
          return createInitialState();
        }
      }

      function saveState() {
        state.lastSavedAt = new Date().toISOString();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function setStatus(message) {
        statusEl.textContent = message || "";
        if (setStatus._timer) clearTimeout(setStatus._timer);
        if (message) {
          setStatus._timer = setTimeout(function () {
            statusEl.textContent = "";
          }, 1800);
        }
      }

      function autoResizeTextarea() {
        answerInputEl.style.height = "auto";
        var nextHeight = answerInputEl.scrollHeight;
        var maxHeight = Math.floor(window.innerHeight * 0.45);
        answerInputEl.style.height = Math.min(nextHeight, maxHeight) + "px";
      }

      function formatLongDate(dateISO) {
        var parts = dateISO.split("-");
        var d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
        return d.toLocaleDateString(undefined, {
          weekday: "long",
          month: "long",
          day: "numeric",
          year: "numeric"
        });
      }

      function getCurrentQuestion() {
        if (state.currentQuestion < 0 || state.currentQuestion >= questions.length) {
          state.currentQuestion = 0;
        }
        return questions[state.currentQuestion];
      }

      function persistCurrentAnswer() {
        var q = getCurrentQuestion();
        state.answers[q.id] = answerInputEl.value;
        saveState();
      }

      function buildShareText() {
        var lines = [];
        lines.push("Nightly Review for " + state.date);
        lines.push("");

        for (var i = 0; i < questions.length; i++) {
          var q = questions[i];
          var answer = (state.answers[q.id] || "").trim();
          lines.push((i + 1) + ". " + q.text);
          lines.push(answer || "[No response]");
          lines.push("");
        }

        return lines.join("\n").trim();
      }

      function renderQuestionView() {
        var q = getCurrentQuestion();

        questionTextEl.textContent = q.text;
        answerLabelEl.textContent = q.text;
        answerInputEl.value = state.answers[q.id] || "";
        progressEl.textContent = (state.currentQuestion + 1) + " of " + questions.length;
        backButtonEl.disabled = state.currentQuestion === 0;
        nextButtonEl.textContent = state.currentQuestion === questions.length - 1 ? "Finish" : "Next";

        errorBoxEl.classList.add("hidden");
        errorBoxEl.textContent = "";

        questionViewEl.classList.remove("hidden");
        summaryViewEl.classList.add("hidden");
        footerNavEl.classList.remove("hidden");

        autoResizeTextarea();
      }

      function renderSummaryView() {
        progressEl.textContent = "Complete";
        summaryDateEl.textContent = formatLongDate(state.date);
        summaryItemsEl.innerHTML = "";

        for (var i = 0; i < questions.length; i++) {
          var q = questions[i];
          var value = (state.answers[q.id] || "").trim();

          var wrapper = document.createElement("section");
          wrapper.className = "summary-item";

          var qEl = document.createElement("h2");
          qEl.className = "summary-question";
          qEl.textContent = (i + 1) + ". " + q.text;

          var aEl = document.createElement("p");
          aEl.className = "summary-answer" + (value ? "" : " empty");
          aEl.textContent = value || "[No response]";

          wrapper.appendChild(qEl);
          wrapper.appendChild(aEl);
          summaryItemsEl.appendChild(wrapper);
        }

        questionViewEl.classList.add("hidden");
        summaryViewEl.classList.remove("hidden");
        footerNavEl.classList.add("hidden");
      }

      function render() {
        if (state.mode === "summary") {
          renderSummaryView();
        } else {
          renderQuestionView();
        }
      }

      function showFatalError(message) {
        questionTextEl.textContent = "Something went wrong.";
        progressEl.textContent = "";
        errorBoxEl.textContent = message;
        errorBoxEl.classList.remove("hidden");
      }

      function fallbackCopy(text) {
        var temp = document.createElement("textarea");
        temp.value = text;
        temp.setAttribute("readonly", "");
        temp.style.position = "absolute";
        temp.style.left = "-9999px";
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
        setStatus("Copied.");
      }

      function isLikelyMobile() {
        return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      }

      answerInputEl.addEventListener("input", function () {
        var q = getCurrentQuestion();
        state.answers[q.id] = answerInputEl.value;
        saveState();
        autoResizeTextarea();
      });

      answerInputEl.addEventListener("blur", function () {
        persistCurrentAnswer();
      });

      backButtonEl.addEventListener("click", function () {
        persistCurrentAnswer();
        if (state.currentQuestion > 0) {
          state.currentQuestion -= 1;
          state.mode = "question";
          saveState();
          render();
        }
      });

      nextButtonEl.addEventListener("click", function () {
        persistCurrentAnswer();
        if (state.currentQuestion < questions.length - 1) {
          state.currentQuestion += 1;
          state.mode = "question";
        } else {
          state.mode = "summary";
        }
        saveState();
        render();
      });

      editButtonEl.addEventListener("click", function () {
        state.mode = "question";
        state.currentQuestion = 0;
        saveState();
        render();
      });

      copyButtonEl.addEventListener("click", function () {
        var text = buildShareText();
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            setStatus("Copied.");
          }).catch(function () {
            fallbackCopy(text);
          });
        } else {
          fallbackCopy(text);
        }
      });

      shareButtonEl.addEventListener("click", function () {
        var text = buildShareText();

        if (navigator.share) {
          navigator.share({
            title: "Nightly Review",
            text: text
          }).catch(function () {});
          return;
        }

        if (isLikelyMobile()) {
          window.location.href = "sms:?&body=" + encodeURIComponent(text);
          return;
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            setStatus("Copied for sharing.");
          }).catch(function () {
            fallbackCopy(text);
          });
        } else {
          fallbackCopy(text);
        }
      });

      try {
        render();
      } catch (e) {
        showFatalError("The page loaded, but the review questions could not be rendered. Try refreshing once. If it keeps happening, replace the file with the latest version.");
      }
    })();
  </script>
</body>
</html>
